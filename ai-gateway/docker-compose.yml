# 本地一键启动（含 Redis + MySQL）
# 使用: docker compose up --build

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: platform
      MYSQL_USER: platform
      MYSQL_PASSWORD: platform
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  gateway:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: mysql+aiomysql://platform:platform@mysql:3306/platform
      MODELS_CONFIG_PATH: /app/config/models.yaml
      CLIENTS_CONFIG_PATH: /app/config/clients.yaml
      CHROMA_PERSIST_DIR: /app/data/chroma
      DATASET_UPLOAD_DIR: /app/data/uploads
    volumes:
      - ./config:/app/config:ro
      - platform_data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  mysql_data:
  platform_data:
