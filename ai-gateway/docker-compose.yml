# 本地一键启动（含 Redis，用于分布式限流与用量统计）
# 使用: docker compose up --build
# 不启用 Redis 时: 删除或清空环境变量 REDIS_URL，并移除 depends_on / redis 服务。

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  gateway:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      MODELS_CONFIG_PATH: /app/config/models.yaml
      CLIENTS_CONFIG_PATH: /app/config/clients.yaml
    volumes:
      - ./config:/app/config:ro
    depends_on:
      - redis
